services:
  - type: web
    name: finsight-app
    runtime: python
    buildCommand: "cd backend && pip install -r requirements.txt && pip install gunicorn 'psycopg[binary]'"
    startCommand: "cd backend && gunicorn app:app -b 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: FLASK_DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DATA_PROVIDER
        value: "mock"
      - key: LLM_PROVIDER
        value: "stub"
